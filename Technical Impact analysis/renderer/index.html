<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSCTD Document Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-file-earmark-text-fill"></i>
            MSCTD Document Generator
        </span>
    </div>
</nav>
<div class="container-fluid mt-3">

    <div class="row g-3">

        <!-- LEFT PANEL -->
        <div class="col-lg-3">

            <div class="card shadow-sm border-0">

                <div class="card-header bg-dark text-white">
                    <i class="bi bi-folder2-open"></i> Template Files
                </div>

                <div class="card-body">

                    <div class="file-box mb-3">
                        <label class="form-label">TXT Template</label>
                        <input type="file" id="txtTemplate" class="form-control" accept=".txt">
                    </div>

                    <div class="file-box mb-3">
                        <label class="form-label">Impact Excel</label>
                        <input type="file" id="impactExcel" class="form-control" accept=".xlsx">
                    </div>

                    <div class="file-box">
                        <label class="form-label">MSCTD Excel</label>
                        <input type="file" id="msctdExcel" class="form-control" accept=".xlsx">
                    </div>

                </div>
            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="col-lg-9">

            <!-- PROJECT INFO -->
            <div class="card shadow-sm border-0 mb-3">

                <div class="card-header bg-success text-white">
                    Project Information
                </div>

                <div class="card-body">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">MSCTD Number</label>
                            <input type="text" class="form-control" id="msctdNumber" placeholder="MSCTD-1300">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Repository Name</label>
                            <input type="text" class="form-control" id="repositoryName" placeholder="src-cc-test">
                        </div>

                    </div>

                </div>
            </div>

            <!-- REQUIREMENTS -->
            <div class="card shadow-sm border-0">

                <div class="card-header bg-warning d-flex justify-content-between align-items-center">

                    <span><i class="bi bi-list-task"></i> Requirements</span>

                    <button class="btn btn-dark btn-sm" id="btnAddRequirement">
                        <i class="bi bi-plus-circle"></i> Add
                    </button>

                </div>

                <div class="card-body">

                    <div id="requirementsContainer" class="requirements-area">
                        <!-- Dynamic Requirements -->
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

<!-- FIXED ACTION BAR (MAJOR UX UPGRADE) -->
<div class="fixed-bottom bg-white border-top shadow-lg p-3">

    <div class="container-fluid d-flex justify-content-between align-items-center">

        <div class="small text-muted" id="footerStatus">
            All changes saved locally
        </div>

        <button class="btn btn-success btn-lg px-4" id="btnGenerateAll">
            <i class="bi bi-download"></i>
            Generate All Files
        </button>

    </div>

</div>

<!-- LIBRARIES -->
<script src="libraries/jszip.min.js"></script>
<script src="libraries/xlsx.full.min.js"></script>
<script src="libraries/pptxgen.bundle.js"></script>
<script src="libraries/FileSaver.min.js"></script>
<script src="libraries/exceljs.min.js"></script>

<!-- PROJECT SCRIPTS -->
<script src="./js/utils.js"></script>
<script src="./js/templateManager.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/txtGenerator.js"></script>
<script src="./js/excelGenerator.js"></script>
<script src="app.js"></script>

</body>
</html>
